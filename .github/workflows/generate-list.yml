name: Generate list.m3u

on:
  schedule:
    - cron: '0 17 * * *'  # 每天 UTC+8 01:00 运行一次
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate list.m3u
        run: python generate_m3u.py -o list.m3u

      - name: Set commit message to generation time
        run: |
          ts=$(python -c "from datetime import datetime, timedelta, timezone; print(datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M:%S'))")
          echo "COMMIT_MESSAGE=生成于 ${ts} UTC+8" >> "$GITHUB_ENV"

      - name: Commit and push updated list.m3u and logs
        uses: EndBug/add-and-commit@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "${{ env.COMMIT_MESSAGE }}"
          add: "list.m3u log/info log/error"
          author_name: "github-actions[bot]"
          author_email: "41898282+github-actions[bot]@users.noreply.github.com"
          push: true
